services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
#    environment:
#      PAWTH_DOCKER_LOCAL: 'true' # ローカル環境用
    depends_on:
      - db
    ports:
      - '80:3000'
#      - '3001:3000' # ローカル環境用
    volumes:
      - ./log:/app/log
      - ./storage:/app/storage
    restart: always

  db:
    image: postgres:17
    env_file:
      - .env.production
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

volumes:
  db_data:
