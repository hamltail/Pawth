name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1) SSHディレクトリ作成
      - name: Prepare SSH dir
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      # 2) 秘密鍵を書き出し（Base64をデコード）
      - name: Write SSH key (base64 -> pem)
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > key.pem
          sed -i 's/\r$//' key.pem
          chmod 600 key.pem
          ssh-keygen -lf key.pem || true

      # 3) known_hosts 追加
      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # 4) 接続テスト
      - name: Test SSH connectivity
        run: |
          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -i key.pem \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'echo OK-from-EC2'

      # 5) デプロイ本体
      - name: Deploy to EC2
        env:
          APP_DIR: ${{ vars.APP_DIR || '/var/www/pawth' }}
        run: |
          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -i key.pem \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "bash -lc '
              set -euo pipefail
              cd \"${APP_DIR}\"

              git fetch --all --prune
              git reset --hard origin/main

              bundle config set without \"development test\"
              bundle install --deployment

              RAILS_ENV=production bin/rails db:migrate
              RAILS_ENV=production bin/rails assets:precompile || true

              sudo systemctl restart puma
              sudo systemctl restart solid_queue || true
            '"
