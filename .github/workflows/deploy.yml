name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on Lightsail (Docker)
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no "${USER}@${HOST}" << 'EOF'
          set -euo pipefail

          cd "${APP_DIR}"

          echo "==> Git fetch / pull"
          git fetch --prune
          git checkout main
          git pull --ff-only

          echo "==> Docker Compose build & up"
          # 使うComposeファイルは明示
          COMPOSE="docker compose -f compose.prod.yml"

          # 画像を最新に（レジストリ未使用ならエラーでも継続OK）
          $COMPOSE pull || true
          # 依存を引き込みつつ再ビルドして起動。不要サービスは落とす
          $COMPOSE up -d --build --remove-orphans

          echo "==> Wait DB / Rails ready (retry)"
          retry () { n=0; until "$@"; do n=$((n+1)); [ $n -ge 10 ] && return 1; echo "retry #$n"; sleep 3; done; }
          retry $COMPOSE exec -T web bash -lc "bundle exec rails db:version" >/dev/null

          echo "==> DB migrate"
          # -T: 非TTY環境でハングしないように。失敗ならログを出して終了
          $COMPOSE exec -T web bash -lc "bundle exec rails db:migrate"

          echo "==> Cleanup dangling images"
          docker image prune -f >/dev/null || true

          echo "✅ Deploy finished on Lightsail"
          EOF
