name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy on Lightsail (Docker)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SERVER_USER}@${SERVER_HOST}" <<EOF
          set -euo pipefail

          cd "${APP_DIR}"

          echo "==> Git fetch / reset"
          git fetch --prune
          git checkout main || git checkout -b main
          git reset --hard origin/main
          git clean -fd

          echo "==> Docker Compose down (cleanup old containers)"
          docker compose -f compose.prod.yml down || true

          echo "==> Docker Compose build & up"
          COMPOSE="docker compose -f compose.prod.yml"
          \$COMPOSE pull || true
          \$COMPOSE up -d --build --remove-orphans

          echo "==> DB ready check"
          retry () { n=0; until "\$@"; do n=\$((n+1)); [ \$n -ge 10 ] && return 1; echo "retry #\$n"; sleep 3; done; }
          retry \$COMPOSE exec -T web bash -lc "bundle exec rails db:version" >/dev/null

          echo "==> DB migrate"
          \$COMPOSE exec -T web bash -lc "bundle exec rails db:migrate"

          echo "✅ Deploy finished on Lightsail"
          EOF
