name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      TZ: 'Asia/Tokyo'
      RAILS_ENV: test
      BUNDLE_PATH: vendor/bundle
      DATABASE_URL: 'postgres://postgres:postgres@localhost:5432/test_db'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ vars.RUBY_VERSION || '3.4' }}
          bundler-cache: true
      - name: Setup Node (for ESLint/Prettier)
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install JS deps
        if: hashFiles('package.json') != ''
        run: npm ci
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && exit 0
            sleep 1
          done
          echo 'Postgres not ready' && exit 1
      - name: Prepare DB (create & load schema)
        run: bin/rails db:create db:schema:load
      - name: RuboCop
        if: hashFiles('.rubocop.yml') != ''
        run: bundle exec rubocop --parallel
      - name: ESLint
        if: hashFiles('.eslintrc*') != ''
        run: npx eslint .
      - name: Prettier (check)
        if: hashFiles('package.json') != ''
        run: |
          npx prettier --check \
            "app/**/*.{js,jsx,ts,tsx,css,scss,html,erb,json,md,yml,yaml}" \
            "config/**/*.{yml,yaml}" \
            ".github/**/*.yml"
      - name: Run RSpec
        if: hashFiles('spec/**/*') != ''
        run: bundle exec rspec --format documentation

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    env:
      CI: 'true'
      TZ: 'Asia/Tokyo'
      RAILS_ENV: test
      BUNDLE_PATH: vendor/bundle
      DATABASE_URL: 'postgres://postgres:postgres@localhost:5432/test_db'
      PORT: '3001'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ vars.RUBY_VERSION || '3.4' }}
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: Install E2E deps
        working-directory: e2e
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browsers
        working-directory: e2e
        run: npm run install:browsers
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && exit 0
            sleep 1
          done
          echo 'Postgres not ready' && exit 1
      - name: Prepare DB
        working-directory: e2e
        run: ../bin/rails db:create db:schema:load
      - name: Run Playwright
        working-directory: e2e
        run: npm test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
