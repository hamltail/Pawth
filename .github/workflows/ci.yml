name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      BUNDLE_PATH: vendor/bundle
      DATABASE_URL: 'postgres://postgres:postgres@localhost:5432/test_db'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ vars.RUBY_VERSION || '3.4' }}
          bundler-cache: true

      - name: Setup Node (for ESLint/Prettier)
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Prepare DB (create & load schema)
        run: |
          bin/rails db:create db:schema:load

      - name: RuboCop
        if: hashFiles('.rubocop.yml') != ''
        run: bundle exec rubocop --parallel

      - name: ESLint
        if: hashFiles('.eslintrc*') != ''
        run: npx eslint .

      - name: Prettier (check)
        if: hashFiles('package.json') != ''
        run: |
          npx prettier --check \
            "app/**/*.{js,jsx,ts,tsx,css,scss,html,erb,haml,json,md,yml,yaml}" \
            "config/**/*.{yml,yaml}" \
            ".github/**/*.yml"

      - name: Run RSpec
        if: hashFiles('spec/**/*') != ''
        run: bundle exec rspec --format documentation
