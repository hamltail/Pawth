default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: pawth_development

test:
  <<: *default
  database: pawth_test

production:
  <<: *default
  database: pawth_production
  username: pawth
  password: <%= ENV['PAWTH_DATABASE_PASSWORD'] %>
